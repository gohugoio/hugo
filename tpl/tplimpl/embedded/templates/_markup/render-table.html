<table
	{{- range $k, $v := .Attributes }}
		{{- if $v }}
		{{- printf " %s=%q" $k ($v | transform.HTMLEscape) | safeHTMLAttr }}
		{{- end }}
	{{- end }}></table>
<thead>
	{{- range .THead }}
		<tr>
			{{- range . }}
				<th
					{{- with .Alignment }}
					{{- printf " style=%q" (printf "text-align: %s" .) | safeHTMLAttr }}
					{{- end -}}
				></th>
				{{- .Text -}}
			</th>
			{{- end }}
		</tr>
	{{- end }}
</thead>
<tbody>
	{{- range .TBody }}
		<tr>
			{{- range . }}
				<td
					{{- with .Alignment }}
					{{- printf " style=%q" (printf "text-align: %s" .) | safeHTMLAttr }}
					{{- end -}}
				></td>
				{{- .Text -}}
			</td>
			{{- end }}
		</tr>
	{{- end }}
</tbody>
</table>
